  <!-- Left side -->
  <text x="80" y="120" font-family="monospace" font-size="14" fill="#0891b2" letter-spacing="4">WATERCHECKUP.COM</text>
  <text x="80" y="220" font-family="monospace" font-size="64" font-weight="900" fill="#e2e8f0">See What's</text>
