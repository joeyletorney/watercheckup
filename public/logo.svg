<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <!-- Drop gradient: deep blue to cyan -->
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Inner drop highlight -->
    <radialGradient id="highlight" cx="38%" cy="30%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- ── Icon: water drop with checkmark ── -->
  <g filter="url(#glow)" transform="translate(4, 6)">
    <!-- Drop shape -->
    <path d="M34 4 C34 4 14 26 14 40 C14 51.6 23 60 34 60 C45 60 54 51.6 54 40 C54 26 34 4 34 4 Z"
          fill="url(#dropGrad)" />
    <!-- Highlight sheen -->
    <path d="M34 4 C34 4 14 26 14 40 C14 51.6 23 60 34 60 C45 60 54 51.6 54 40 C54 26 34 4 34 4 Z"
          fill="url(#highlight)" />
    <!-- Checkmark inside drop -->
    <polyline points="23,40 30,49 46,31"
              fill="none"
              stroke="white"
              stroke-width="4"
              stroke-linecap="round"
              stroke-linejoin="round"
              opacity="0.95"/>
  </g>

  <!-- ── Wordmark ── -->
  <!-- "Water" in white -->
  <text x="72" y="50"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="30"
        font-weight="800"
        fill="#f1f5f9"
        letter-spacing="-0.5">Water</text>
  <!-- "Checkup" in cyan -->
  <text x="155" y="50"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="30"
        font-weight="800"
        fill="#22d3ee"
        letter-spacing="-0.5">Checkup</text>

  <!-- Tagline -->
  <text x="72" y="65"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="11"
        font-weight="500"
        fill="#475569"
        letter-spacing="1.8">REAL EPA WATER QUALITY DATA</text>
</svg>
