<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 52" width="260" height="52">
  <defs>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="highlight" cx="38%" cy="28%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Drop icon -->
  <g filter="url(#glow)" transform="translate(2, 2)">
    <path d="M24 2 C24 2 8 18 8 28 C8 37.4 15.2 44 24 44 C32.8 44 40 37.4 40 28 C40 18 24 2 24 2 Z"
          fill="url(#dropGrad)"/>
    <path d="M24 2 C24 2 8 18 8 28 C8 37.4 15.2 44 24 44 C32.8 44 40 37.4 40 28 C40 18 24 2 24 2 Z"
          fill="url(#highlight)"/>
    <polyline points="15,28 21,35 33,21"
              fill="none" stroke="white" stroke-width="3.5"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="52" y="34"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="26" font-weight="800"
        fill="#f1f5f9">Water</text>
  <text x="122" y="34"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="26" font-weight="800"
        fill="#22d3ee">Checkup</text>
</svg>
